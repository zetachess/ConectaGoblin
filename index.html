<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#090b10">
    <title>GOBLINAJEDREZ ConectaGoblin</title>
    <meta name="description" content="Conecta las piezas de Goblinajedrez sobre un tablero responsive.">
    <link rel="stylesheet" href="styles.css?v=2">
  </head>
  <body>
    <main class="game-shell" aria-label="GOBLINAJEDREZ ConectaGoblin">
      <header class="hud">
        <div class="brand">
          <img src="assets/goblin-logo.png" alt="">
          <div>
            <p>GOBLINAJEDREZ</p>
            <strong>ConectaGoblin</strong>
          </div>
        </div>
        <div class="stats" aria-label="Marcador">
          <span><em aria-hidden="true">P</em><b id="levelLabel">1</b><small>Nivel</small></span>
          <span><em aria-hidden="true">M</em><b id="moveCount">0</b><small>Movs</small></span>
          <span><em aria-hidden="true">R</em><b id="bestCount">0</b><small>Record</small></span>
        </div>
      </header>

      <section class="board-wrap">
        <div class="combo-pill active" id="messagePill" aria-live="polite">
          <strong id="statusTitle">Tu turno</strong>
          <span id="statusText">Une cada pareja y llena todo el tablero.</span>
          <i></i>
        </div>

        <div class="board-frame">
          <div class="rank-labels" aria-hidden="true">
            <span>8</span><span>7</span><span>6</span><span>5</span><span>4</span><span>3</span><span>2</span><span>1</span>
          </div>
          <div id="board" class="board" aria-label="Tablero de ConectaGoblin"></div>
          <div class="file-labels" aria-hidden="true">
            <span>a</span><span>b</span><span>c</span><span>d</span><span>e</span><span>f</span><span>g</span><span>h</span>
          </div>
        </div>

        <div class="overlay" id="overlay">
          <img src="assets/goblin-logo.png" alt="">
          <h1>ConectaGoblin</h1>
          <p>Arrastra desde una pieza hasta su pareja. No cruces caminos y ocupa las 64 casillas.</p>
          <button id="startButton" type="button">Jugar</button>
        </div>
      </section>

      <footer class="controls" aria-label="Controles">
        <button id="undoButton" type="button">Undo</button>
        <button id="resetButton" type="button">Reset</button>
        <button id="nextButton" type="button">Next</button>
      </footer>

      <nav class="level-picker" aria-label="Seleccionar nivel">
        <button class="level-button active" data-level="0">1</button>
        <button class="level-button" data-level="1">2</button>
        <button class="level-button" data-level="2">3</button>
        <button class="level-button" data-level="3">4</button>
        <button class="level-button" data-level="4">5</button>
      </nav>
    </main>

    <script src="app.js?v=2"></script>
  </body>
</html>
